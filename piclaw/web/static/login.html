<!doctype html>
<html lang="en">
<!--
  login.html – TOTP authentication page for PiClaw.

  Shown when WEB_TOTP_SECRET is configured. Collects a 6-digit TOTP code
  and POSTs it to /login for session token creation.

  Served by: channels/web/auth.ts when the user is not authenticated.
-->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Piclaw Login</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f14;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: #1f2937;
        --accent: #38bdf8;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #64748b;
          --border: #e2e8f0;
          --accent: #2563eb;
        }
      }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(92vw, 420px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 18px;
        letter-spacing: 0.18em;
        text-align: center;
      }
      button {
        padding: 12px 16px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
      .error {
        color: #f87171;
        font-size: 13px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Enter your code</h1>
      <p>Use the 6-digit code from your authenticator app.</p>
      <form id="login-form">
        <input
          id="code"
          name="code"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          pattern="[0-9]*"
          maxlength="6"
          placeholder="••••••"
          autofocus
        />
        <button type="submit">Verify</button>
        <div class="error" id="error"></div>
      </form>
    </div>
    <script>
      const form = document.getElementById('login-form');
      const codeInput = document.getElementById('code');
      const errorEl = document.getElementById('error');

      const base64UrlToBuffer = (value) => {
        const pad = '='.repeat((4 - (value.length % 4)) % 4);
        const base64 = (value + pad).replace(/-/g, '+').replace(/_/g, '/');
        const raw = atob(base64);
        const buffer = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) buffer[i] = raw.charCodeAt(i);
        return buffer;
      };

      const bufferToBase64Url = (buffer) => {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (const b of bytes) binary += String.fromCharCode(b);
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      };

      const credentialToJSON = (cred) => ({
        id: cred.id,
        rawId: bufferToBase64Url(cred.rawId),
        type: cred.type,
        response: {
          clientDataJSON: bufferToBase64Url(cred.response.clientDataJSON),
          authenticatorData: bufferToBase64Url(cred.response.authenticatorData),
          signature: bufferToBase64Url(cred.response.signature),
          userHandle: cred.response.userHandle ? bufferToBase64Url(cred.response.userHandle) : null,
        }
      });

      const parseLoginOptions = (options) => ({
        ...options,
        challenge: base64UrlToBuffer(options.challenge),
        allowCredentials: (options.allowCredentials || []).map((cred) => ({
          ...cred,
          id: base64UrlToBuffer(cred.id)
        }))
      });

      let passkeyInFlight = false;
      let passkeySucceeded = false;

      const attemptPasskey = async ({ conditional }) => {
        if (!window.PublicKeyCredential || !navigator.credentials) return;
        if (passkeyInFlight || passkeySucceeded) return;
        passkeyInFlight = true;
        try {
          const res = await fetch('/auth/webauthn/login/start', { method: 'POST' });
          if (!res.ok) {
            passkeyInFlight = false;
            return;
          }
          const payload = await res.json();
          const publicKey = parseLoginOptions(payload.options);
          const cred = await navigator.credentials.get({
            publicKey,
            mediation: conditional ? 'conditional' : 'required'
          });
          if (!cred) {
            passkeyInFlight = false;
            return;
          }
          const finish = await fetch('/auth/webauthn/login/finish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: payload.token, credential: credentialToJSON(cred) })
          });
          if (finish.ok) {
            passkeySucceeded = true;
            window.location.href = '/';
            return;
          }
        } catch (_) {
          // Silent fallback to TOTP
        }
        passkeyInFlight = false;
      };

      if (window.PublicKeyCredential && typeof PublicKeyCredential.isConditionalMediationAvailable === 'function') {
        PublicKeyCredential.isConditionalMediationAvailable()
          .then((available) => { if (available) attemptPasskey({ conditional: true }); })
          .catch(() => {});
      }

      codeInput.addEventListener('focus', () => attemptPasskey({ conditional: false }), { once: false });

      const submitCode = async () => {
        const code = (codeInput.value || '').trim();
        errorEl.textContent = '';
        if (!code) {
          errorEl.textContent = 'Please enter your code.';
          return;
        }
        const res = await fetch('/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        if (res.ok) {
          window.location.href = '/';
          return;
        }
        const payload = await res.json().catch(() => ({}));
        errorEl.textContent = payload.error || 'Invalid code. Try again.';
      };

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        submitCode();
      });
    </script>
  </body>
</html>
