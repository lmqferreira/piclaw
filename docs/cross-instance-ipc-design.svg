<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#334155"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2563eb"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#16a34a"/>
    </marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1200" height="860" fill="#f8fafc"/>
  <text x="600" y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Cross-Instance IPC (Experimental)</text>
  <text x="600" y="56" text-anchor="middle" font-size="14" fill="#334155">Default: LLM-mediated dedicated channel · Optional: short-circuit mode (explicit human opt-in)</text>

  <!-- Left instance -->
  <rect x="40" y="90" width="510" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="40" y="90" width="510" height="36" rx="12" fill="#2563eb"/>
  <text x="58" y="114" font-size="14" font-weight="700" fill="#ffffff">Instance A (Initiator)</text>

  <rect x="60" y="142" width="220" height="92" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="72" y="164" font-size="12" font-weight="700" fill="#1e3a8a">Identity</text>
  <text x="72" y="184" font-size="11" fill="#334155">instance_id = sha256(pubkey)</text>
  <text x="72" y="200" font-size="11" fill="#334155">Ed25519 keypair</text>
  <text x="72" y="216" font-size="11" fill="#334155">fingerprint shown to user</text>

  <rect x="300" y="142" width="230" height="92" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="312" y="164" font-size="12" font-weight="700" fill="#0f172a">Outbound Controls</text>
  <text x="312" y="184" font-size="11" fill="#334155">canonical signing</text>
  <text x="312" y="200" font-size="11" fill="#334155">timestamp + nonce + sig version</text>
  <text x="312" y="216" font-size="11" fill="#334155">hop count + chain-id</text>

  <rect x="60" y="250" width="470" height="118" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="72" y="272" font-size="12" font-weight="700" fill="#14532d">Operator Commands</text>
  <text x="72" y="292" font-size="11" fill="#334155">/pair request &lt;url&gt;</text>
  <text x="72" y="308" font-size="11" fill="#334155">/ask &lt;instance_id&gt; &lt;prompt&gt;</text>
  <text x="72" y="324" font-size="11" fill="#334155">/pair mode &lt;instance_id&gt; &lt;mediated|short-circuit&gt;</text>
  <text x="72" y="340" font-size="11" fill="#334155">/pair permissions &lt;instance_id&gt; &lt;profile&gt;</text>

  <!-- Right instance -->
  <rect x="650" y="90" width="510" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="650" y="90" width="510" height="36" rx="12" fill="#7c3aed"/>
  <text x="668" y="114" font-size="14" font-weight="700" fill="#ffffff">Instance B (Responder)</text>

  <rect x="670" y="142" width="230" height="92" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="682" y="164" font-size="12" font-weight="700" fill="#581c87">Pairing Gate</text>
  <text x="682" y="184" font-size="11" fill="#334155">pending inbound queue</text>
  <text x="682" y="200" font-size="11" fill="#334155">accept/deny/block by fingerprint</text>
  <text x="682" y="216" font-size="11" fill="#334155">URL ownership challenge</text>

  <rect x="920" y="142" width="220" height="92" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="932" y="164" font-size="12" font-weight="700" fill="#9a3412">Auth + Replay</text>
  <text x="932" y="184" font-size="11" fill="#334155">verify signature</text>
  <text x="932" y="200" font-size="11" fill="#334155">check nonce cache TTL</text>
  <text x="932" y="216" font-size="11" fill="#334155">enforce trust_epoch</text>

  <rect x="670" y="250" width="470" height="118" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="682" y="272" font-size="12" font-weight="700" fill="#7f1d1d">Policy Engine (Deterministic Ceiling)</text>
  <text x="682" y="292" font-size="11" fill="#334155">LLM may deny or narrow scope</text>
  <text x="682" y="308" font-size="11" fill="#334155">LLM cannot expand permissions beyond policy</text>
  <text x="682" y="324" font-size="11" fill="#334155">rate limits, budgets, queue priority, circuit breakers</text>
  <text x="682" y="340" font-size="11" fill="#334155">restricted default profile (deny high-risk tools)</text>

  <!-- Pairing flow -->
  <rect x="40" y="420" width="1120" height="178" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="448" font-size="16" font-weight="700" fill="#0f172a">Pairing Sequence</text>

  <line x1="120" y1="490" x2="1080" y2="490" stroke="#e2e8f0" stroke-width="2"/>

  <line x1="160" y1="520" x2="600" y2="520" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="380" y="510" text-anchor="middle" font-size="12" fill="#1d4ed8">1) POST /pair-request</text>

  <line x1="1040" y1="548" x2="640" y2="548" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <text x="840" y="538" text-anchor="middle" font-size="12" fill="#15803d">2) operator accept/deny + signed confirm</text>

  <line x1="600" y1="576" x2="180" y2="576" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <text x="390" y="566" text-anchor="middle" font-size="12" fill="#15803d">3) initiator verifies challenge + stores peer</text>

  <text x="58" y="596" font-size="11" fill="#475569">Security notes: immutable ID acceptance, replay-safe nonce, challenge binds key↔URL, trust epoch established.</text>

  <!-- Interaction modes -->
  <rect x="40" y="620" width="1120" height="210" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="648" font-size="16" font-weight="700" fill="#0f172a">Post-Pair Interaction Modes</text>

  <!-- Mediated mode -->
  <rect x="60" y="668" width="530" height="140" rx="10" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="76" y="690" font-size="13" font-weight="700" fill="#0e7490">Default: Mediated Mode (Dedicated Remote Interop Channel)</text>
  <text x="76" y="710" font-size="11" fill="#334155">A sends signed proposal → B routes to remote interop LLM channel.</text>
  <text x="76" y="726" font-size="11" fill="#334155">LLM returns: accept_execute / deny / negotiate / human_required.</text>
  <text x="76" y="742" font-size="11" fill="#334155">Policy engine validates decision against deterministic limits.</text>
  <text x="76" y="758" font-size="11" fill="#334155">Response can include scope negotiation envelope (tools/timeouts/caps).</text>
  <line x1="100" y1="782" x2="540" y2="782" stroke="#ea580c" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="320" y="775" text-anchor="middle" font-size="11" fill="#9a3412">proposal / decision / negotiation loop</text>

  <!-- Short-circuit mode -->
  <rect x="610" y="668" width="530" height="140" rx="10" fill="#fff7ed" stroke="#fdba74"/>
  <text x="626" y="690" font-size="13" font-weight="700" fill="#9a3412">Optional: Short-Circuit Mode (Direct Execute)</text>
  <text x="626" y="710" font-size="11" fill="#334155">Enabled explicitly by human per peer/profile.</text>
  <text x="626" y="726" font-size="11" fill="#334155">A sends signed execute request → B runs under pre-approved scope.</text>
  <text x="626" y="742" font-size="11" fill="#334155">Still enforced: auth, replay, budgets, queue priority, audit.</text>
  <text x="626" y="758" font-size="11" fill="#334155">Use for trusted low-latency automation only.</text>
  <line x1="650" y1="782" x2="1080" y2="782" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <text x="865" y="775" text-anchor="middle" font-size="11" fill="#334155">direct request/response path</text>

  <text x="600" y="845" text-anchor="middle" font-size="11" fill="#64748b">All paths require signed requests, nonce replay protection, deterministic policy enforcement, and revocation-aware trust epochs.</text>
</svg>
